services:
  animus:
    build:
      context: .
      dockerfile: Dockerfile
    image: animus:latest
    container_name: animus
    restart: unless-stopped

    # Allow container to reach host services (e.g. Ollama running on the Mac Studio)
    extra_hosts:
      - "host.containers.internal:host-gateway"

    ports:
      - "127.0.0.1:8080:8080"

    environment:
      ANIMUS_DATA_DIR: /home/animus/.animus
      ANIMUS_HEALTH_BIND: "0.0.0.0:8080"
      ANIMUS_LOG_LEVEL: "animus=info"

      # ── LLM: Anthropic via Claude Code OAuth (no API key purchase needed) ──
      # Mount ~/.claude/.credentials.json below; the bridge reads it automatically.
      # To use API key instead, set ANTHROPIC_API_KEY and remove the volume mount.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

      # OpenAI (optional, for ANIMUS_LLM_PROVIDER=openai or ANIMUS_EMBED_PROVIDER=openai)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"

      # ── Embedding: Ollama running on the host Mac Studio ────────────────────
      ANIMUS_EMBED_PROVIDER: "${ANIMUS_EMBED_PROVIDER:-ollama}"
      ANIMUS_OLLAMA_URL: "http://host.containers.internal:11434"
      ANIMUS_EMBED_MODEL: "${ANIMUS_EMBED_MODEL:-mxbai-embed-large}"

      # ── Federation (disabled by default) ────────────────────────────────────
      ANIMUS_FEDERATION: "${ANIMUS_FEDERATION:-0}"

    volumes:
      # Persistent AILF data (VectorFS, goals, identity)
      - animus-data:/home/animus/.animus
      # Claude Code OAuth credentials — read-only, for OAuth auth without API key
      - "${HOME}/.claude/.credentials.json:/home/animus/.claude/.credentials.json:ro"

    # Healthcheck using the built-in HTTP endpoint
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  animus-data:

networks:
  default:
    name: animus-net
