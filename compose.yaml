services:
  animus:
    build:
      context: .
      dockerfile: Dockerfile
    image: animus:latest
    container_name: animus
    restart: unless-stopped

    ports:
      - "127.0.0.1:8082:8082"

    environment:
      ANIMUS_DATA_DIR: /home/animus/.animus
      ANIMUS_HEALTH_BIND: "0.0.0.0:8082"
      ANIMUS_LOG_LEVEL: "animus=debug,animus_cortex=debug"

      # ── LLM: Anthropic via Claude Code OAuth (no API key purchase needed) ──
      # Option 1 (recommended): Run `podman compose up` from within a Claude Code terminal.
      #   CLAUDE_CODE_OAUTH_TOKEN is automatically injected by the Claude Code CLI.
      # Option 2: Set ANTHROPIC_API_KEY or ANTHROPIC_OAUTH_TOKEN manually.
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      CLAUDE_CODE_OATH_TOKEN: "${CLAUDE_CODE_OATH_TOKEN:-}"
      # OAuth tokens (Claude Max subscription) only support Haiku models via API.
      # For Sonnet/Opus, set ANTHROPIC_API_KEY and ANIMUS_MODEL=claude-sonnet-4-20250514.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANIMUS_MODEL: "${ANIMUS_MODEL:-claude-haiku-4-5-20251001}"

      # OpenAI (optional, for ANIMUS_LLM_PROVIDER=openai or ANIMUS_EMBED_PROVIDER=openai)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"

      # ── Embedding: Ollama running on the host machine ────────────────────────
      # On macOS + Podman, set ANIMUS_OLLAMA_URL to your Mac's LAN IP:
      #   export ANIMUS_OLLAMA_URL=http://192.168.0.200:11434
      # On Linux + Docker, host.containers.internal or host-gateway works directly.
      ANIMUS_EMBED_PROVIDER: "${ANIMUS_EMBED_PROVIDER:-ollama}"
      ANIMUS_OLLAMA_URL: "${ANIMUS_OLLAMA_URL:-http://localhost:11434}"
      ANIMUS_EMBED_MODEL: "${ANIMUS_EMBED_MODEL:-mxbai-embed-large}"

      # ── Telegram bot (set ANIMUS_TELEGRAM_TOKEN to enable) ─────────────────
      # Create a bot via @BotFather, copy the token here or export it:
      #   export ANIMUS_TELEGRAM_TOKEN=123456789:ABCdef...
      ANIMUS_TELEGRAM_TOKEN: "${ANIMUS_TELEGRAM_TOKEN:-}"

      # ── Autonomy mode (reactive | goal_directed | full) ──────────────────
      ANIMUS_AUTONOMY_MODE: "${ANIMUS_AUTONOMY_MODE:-reactive}"

      # ── Security: trusted Telegram user IDs (comma-separated) ───────────
      # Your Telegram user ID (get it from @userinfobot). Bypasses heavy scan.
      ANIMUS_TRUSTED_TELEGRAM_IDS: "${ANIMUS_TRUSTED_TELEGRAM_IDS:-}"

      # ── NATS messaging bus ──────────────────────────────────────────────────
      ANIMUS_NATS_URL: "${ANIMUS_NATS_URL:-nats://nats:14222}"

      # ── Federation (disabled by default) ────────────────────────────────────
      ANIMUS_FEDERATION: "${ANIMUS_FEDERATION:-0}"

    depends_on:
      nats:
        condition: service_healthy

    volumes:
      # Persistent AILF data (VectorFS, goals, identity)
      - animus-data:/home/animus/.animus
      # Claude Code OAuth credentials — for OAuth auth without purchasing API tokens.
      # Mounted read-write so the engine can persist refreshed tokens.
      - "${HOME}/.claude/.credentials.json:/home/animus/.claude/.credentials.json"
      # Shared communication channel between Animus and Claude Code.
      # Animus writes to /home/animus/comms/to-claude/
      # Claude Code writes to /home/animus/comms/from-claude/
      - "${HOME}/animus-comms:/home/animus/comms"

    # Healthcheck using the built-in HTTP endpoint
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nats:
    image: nats:alpine
    container_name: animus-nats
    restart: unless-stopped
    command: ["-p", "14222", "--jetstream", "-m", "8222"]
    ports:
      # Expose to host so nuntius (Claude Code MCP) can also connect
      - "127.0.0.1:14222:14222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  animus-data:

networks:
  default:
    name: animus-net
